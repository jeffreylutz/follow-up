# sshd drop-in for the HITL bench demo (Included by /etc/ssh/sshd_config).
# Global settings must precede the Match block.
PasswordAuthentication yes
PermitRootLogin no

# Actively probe clients so a DEAD connection (crash, kill -9, yanked network)
# is detected and the session torn down — which closes the wrapper's lock fd and
# frees the bench. Without this, a half-open TCP connection can hold the lock
# until the hard time cap fires. ~10-15s detection (5s x up to 2 missed probes).
ClientAliveInterval 5
ClientAliveCountMax 2

# Every member of the `hil` group is forced through the bench wrapper, no matter
# what command the client requests. This is the single chokepoint that governs
# BOTH interactive users and CI/CD runs.
Match Group hil
    ForceCommand /usr/local/sbin/hil-session
    PermitTTY yes
    X11Forwarding no
    AllowTcpForwarding no
